services:

  # ── Development ─────────────────────────────────────────────────────────────
  # Hot-reload Vite dev server. node_modules live inside the container
  # (anonymous volume), so host and container packages stay isolated.
  #
  # Usage: docker compose up dev
  dev:
    build:
      context: .
      target: deps          # Only install stage — no full build needed
    command: npx vite --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - .:/app              # Mount source for hot-reload
      - node_modules:/app/node_modules  # Isolate container packages (virtual env)
    environment:
      - NODE_ENV=development

  # ── Production ──────────────────────────────────────────────────────────────
  # Full multi-stage build → served by nginx on port 80.
  #
  # Usage: docker compose up prod --build
  prod:
    build:
      context: .
      target: production
    ports:
      - "8080:80"

volumes:
  # Named volume keeps node_modules isolated from the host filesystem,
  # equivalent to a Python virtual environment.
  node_modules:
